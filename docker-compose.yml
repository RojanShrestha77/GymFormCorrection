version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: gymform_db
      POSTGRES_USER: gymform
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymform -d gymform_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://gymform:${DB_PASSWORD}@db:5432/gymform_db
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./lateral_raise_model.tflite:/app/lateral_raise_model.tflite:ro
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
